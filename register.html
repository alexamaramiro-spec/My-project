<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis/sign-up</title>
    <link rel="stylesheet" href="./style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc~+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="box-2"></div>
        <div class="box-1">
            
           <h2 style="color:#737373;">Get Started<i class="fa-regular fa-hand-peace" style="color: rgb(255, 212, 59);"></i></h2>
            <p>Fill out your information to get started</p>
            <div></div>

            <form class="form">
                <div class="div-r1">
                    <label class="label-r1" for="Email">Email</label>
                    <input type="email"  id="email">
                </div>
                <div class="div-r2">
                    <label class="label-r2" for="username">Username</label>
                    <input type="username" id="username">
                </div>
                <div class="div-r3">
                    <label class="label-r3" for="phnumber">Phone number</label>
                    <input type="tel" id="phnumber">
                </div>
                <div class="div-r4">
                    <label class="label-r4" for="Rc(Optional)">Referral code(Optional)
                    </label>
                    <input type="text" id="rc">
                </div>
                 <div class="div-r5">
                    <label class="label-r5" for="password">Password</label>
                    <input type="password" id="password"><br>
                 </div>

                 <button type="submit">Next</button>
            </form>
            <div class="j">
                <div>
                    <p>By creating your account, you agree to Oasis's</p>
                </div>

                <div style="display: flex; gap: 5px;">
                     <a href="www.terms" style="text-decoration: underline; color: goldenrod;">Terms of Use</a>&<a href="www.provacy" style="text-decoration: underline; color: goldenrod;">Privacy Policy</a>
                </div>
            </div>

            <div class="c">
               <p>I already have an account</p>
               <a href="index.html" style="color: goldenrod;">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
