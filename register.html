<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis/sign-up</title>
    <link rel="stylesheet" href="./style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="box-2"></div>
        <div class="box-1">
            
           <h2 style="color:#737373;">Get Started</h2>
            <p>Fill out your information to get started</p>
            <div></div>

            <form class="form">
                <div class="div-r1">
                    <label class="label-r1" for="Email">Email</label>
                    <input type="email"  id="email">
                </div>
                <div class="div-r2">
                    <label class="label-r2" for="username">Username</label>
                    <input type="username" id="username">
                </div>
                <div class="div-r3">
                    <label class="label-r3" for="phnumber">Phone number</label>
                    <input type="tel" id="phnumber">
                </div>
                <div class="div-r4">
                    <label class="label-r4" for="Rc(Optional)">Referral code(Optional)
                    </label>
                    <input type="text" id="rc">
                </div>
                 <div class="div-r5">
                    <label class="label-r5" for="password">Password</label>
                    <input type="password" id="password"><br>
                 </div>
            </form>
                </div>
            <div></div>
        </div>
    </div>
</body>
</html>
