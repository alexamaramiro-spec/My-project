<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis.sign-in</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        
        <div class="box-2"></div>

        <div class="box-1">
            <h2 style="color: black;">Welcome back<i class="fa-regular fa-hand-peace" style="color: rgb(255, 212, 59);"></i></h2>
            <p style="font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">Fill out your information to get started</p>

            <form class="form">
                <div class="div-1">
                    <label class="label" for="email">Email</label>
                    <input type="email"  id="email"><br>
                </div>

                <div class="div-2">
                    <label class="label-2" for="password">Password</label>
                    <input type="password" id="password"><br>
                </div>

                <div class="reset">
                    <p>Forgot Password?</p>
                    <a href="www.resetpassword" target="_blank" style="color: goldenrod;">Reset it here</a>
                </div>

                <div class="log">
                    <button type="submit">Log In</button>
                    <a href="./register.html" class="reg">Don't have an account?<p style="color: goldenrod;">Create One</p></a>
                </div>

            </form>

            <div class="d">
                 <p>You can now download the</p>
                 <p class="oasis" style="font-style: solid;">Oasis App</p>
                 <p>here</p>
            </div>
<!-- Download buttons -->
            <div class="download">
                <div class="andriod"><i class="fa-brands fa-android" style="color: hsl(43, 89%, 38%);"></i><p style="color: rgb(255, 228, 77)">|</p>Andriod
                </div>
                <div class="ios"><i class="fa-brands fa-apple" style="color: rgb(184, 134, 11);"></i><p  style="color: rgb(255, 228, 77);">|</p>iOS</div>
            </div>
        </div>
    </div>
</body>
</html>
